<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <title>용돈기입짱짱</title>
    <style>


        @font-face {
            font-family: 'MabinogiClassicR';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2207-01@1.0/MabinogiClassicR.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        body {
            background-color: #C9D6DF;
            font-family: 'MabinogiClassicR';
            font-size: 16px;
            font-weight: 400;
            text-rendering: optimizeLegibility;
        }

        div.table-title {
            display: block;
            margin: auto;
            max-width: 600px;
            padding:5px;
            width: 100%;
        }

        .table-title h3 {
            color: #1E2022;
            font-size: 30px;
            font-weight: 400;
            font-style:normal;
            text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.1);
            text-transform:uppercase;
        }


        /*** Table Styles **/

        .table-fill {
            background: white;
            border-radius:3px;
            border-collapse: collapse;
            height: 100px;
            margin: auto;
            max-width: 600px;
            padding:5px;
            width: 100%;
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1);
            animation: float 5s infinite;
        }

        th {
            color:#1E2022;
            background:#52616B;
            border-bottom:4px solid #9ea7af;
            border-right: 1px solid #343a45;
            font-size:23px;
            font-weight: 100;
            padding:24px;
            text-align:left;
            text-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
            vertical-align:middle;
        }

        th:first-child {
            border-top-left-radius:3px;
        }

        th:last-child {
            border-top-right-radius:3px;
            border-right:none;
        }

        tr {
            border-top: 1px solid #C1C3D1;
            border-bottom-: 1px solid #C1C3D1;
            color:#1E2022;
            font-size:16px;
            font-weight:normal;
            text-shadow: 0 1px 1px rgba(256, 256, 256, 0.1);
        }


        tr:first-child {
            border-top:none;
        }

        tr:last-child {
            border-bottom:none;
        }

        tr:nth-child(odd) td {
            background:#EBEBEB;
        }

        tr:nth-child(odd):hover td {
            background:#4E5066;
        }

        tr:last-child td:first-child {
            border-bottom-left-radius:3px;
        }

        tr:last-child td:last-child {
            border-bottom-right-radius:3px;
        }

        td {
            background:#FFFFFF;
            /*padding:20px;*/
            text-align:left;
            vertical-align:middle;
            /*font-weight:300;*/
            font-size:18px;
            text-shadow: -1px -1px 1px rgba(0, 0, 0, 0.1);
            border-right: 1px solid #C1C3D1;
            height: 100px;
        }

        td:last-child {
            border-right: 0px;
        }

        th.text-center {
            text-align: center;
        }

        th.text-right {
            text-align: right;
        }

        td.text-left {
            text-align: left;
        }

        td.text-center {
            text-align: center;
        }

        td.text-right {
            text-align: right;
        }

        input, textarea{
            height: 100% ;
            border: 0px solid #1E2022;
            outline: none;
        }

        button{
            height:100%;
            width:100%;
            border: none;
        }

        a{
            text-decoration: none;
        }
    </style>
</head>
<body>

<a href="/money/calendar">
    <Strong><< </Strong>
</a>

<div class="table-title">
    <h3>~입출금 내역~</h3>
</div>

<form method="post" th:action="@{/money/save}">
    <table class="table-fill">
        <thead>
        <tr>
            <th class="text-left">날짜</th>
            <th class="text-left">지출처</th>
            <th class="text-left">들어온 돈</th>
            <th class="text-left">나간 돈</th>
            <th class="text-left">남은 돈</th>
            <th class="text-left">메모</th>
            <th class="text-right">   </th>
        </tr>
        </thead>
        <tbody class="table-hover">
        <tr>
            <td class="text-left"><input type="date" id="date" name="date" required></td>
            <td class="text-left"><input type="text" id="where" name="where" required></td>
            <td class="text-left"><input type="number" id="input" name="input" min="0" ></td>
            <td class="text-left"><input type="number" id="output" name="output" min="0" ></td>
            <td class="text-left"><input type="number" id="total" name="total" min="0" required></td>
            <td class="text-left"><textarea id="memo" name="memo"></textarea></td>
            <td class="text-left">
                <button type="submit">저장</button>
            </td>
        </tr>
        <tr th:each="money : ${moneys}">

            <td th:text="${money.date}" class="text-left">날짜</td>
            <td th:text="${money.where}" class="text-left">지출처</td>
            <td th:text="${money.input}" class="text-left">들어온 돈</td>
            <td th:text="${money.output}" class="text-left">나간 돈</td>
            <td th:text="${money.total}" class="text-left">남은 돈</td>
            <td th:text="${money.memo}" class="text-left">메모</td>
<!--            <button-->
<!--                    onclick="location.href='editMoney.html'"-->
<!--                    th:onclick="|location.href='@{/edit/{moneyId}(moneyId=${money.getId})}'|" type="button">수정</button>-->
        </tr>
        </tbody>
    </table>
</form>

</body>
</html>
